name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm --filter @vikingo/ui exec tsc --noEmit

      - name: Lint (Biome)
        run: pnpm --filter @vikingo/ui exec biome lint . --diagnostic-level=error

      - name: Build
        run: pnpm --filter @vikingo/ui build
